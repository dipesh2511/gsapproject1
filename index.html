<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic gsap project</title>
    <link rel="stylesheet" href="./index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- cdn link for tailwindcss -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body>

    <main id="main" class="bg-black w-full">
        <nav id="nav" class="h-[60px] flex justify-between items-center px-10">
            <h1 class="nav-text text-white w-3/5">DIPESH POHANEKAR</h1>
            <h1 class="nav-text text-white">INSTAGRAM</h1>
            <h1 class="nav-text text-white">GALLERY</h1>
            <h1 class="nav-text text-white">CONTACT</h1>
        </nav>

        <section id="hero-section"
            class="relative mx-auto w-[95%] h-[calc(100vh-60px-60px)] flex flex-col justify-center leading-none">
            <div id="img1" class="img z-[1] w-[15%] aspect-[2/3]"></div>
            <div id="img2" class="img z-[2] w-[15%] aspect-[2/3]"></div>
            <div id="img3" class="img z-[3] w-[15%] aspect-[2/3]"></div>
            <h1 class="relative hero-text text-white w-fit z-10">Hello ,</h1>
            <h1 class="relative hero-text text-white w-full z-10 px-[50px]">I'M DIPESH</h1>
            <h1 class="relative hero-text text-white w-full text-center z-10">POHANEKAR</h1>
        </section>

        <footer class="h-[60px] flex items-center text-white">
            <div class="w-full px-10 flex gap-5 justify-between">
                <p class="footer-text text-center">DIPESH POHANEKAR</p>
                <p class="footer-text text-center">A WEB DEVELOPER <br>BASED IN BHILAI</p>
                <p class="footer-text text-center">&copy; 2023 DIPESH POHANEKAR</p>
            </div>
        </footer>

    </main>

    <!-- script for js file and gsap cdn link -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"
        integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="./index.js"></script>
</body>

</html>
